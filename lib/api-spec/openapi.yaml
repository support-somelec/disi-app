openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SOMELEC Plans d'Action API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: plans
  - name: users
  - name: attachments
  - name: employes

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: Get all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user role or direction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted

  /plans:
    get:
      operationId: getPlans
      tags: [plans]
      summary: Get plans d'action
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: directionId
          in: query
          required: false
          schema:
            type: integer
        - name: createdById
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
    post:
      operationId: createPlan
      tags: [plans]
      summary: Create a new plan d'action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /plans/analytics:
    get:
      operationId: getPlansAnalytics
      tags: [plans]
      summary: Get budget/consumption analytics by direction and category
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "404":
          description: Not found
    put:
      operationId: updatePlan
      tags: [plans]
      summary: Update a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanRequest"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /plans/{id}/validate:
    post:
      operationId: validatePlan
      tags: [plans]
      summary: Validate or reject a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidatePlanRequest"
      responses:
        "200":
          description: Plan validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /plans/{id}/cloturer:
    post:
      operationId: cloturerPlan
      tags: [plans]
      summary: Close a plan (clôture)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloturerPlanRequest"
      responses:
        "200":
          description: Plan closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /plans/{id}/moyens:
    get:
      operationId: getPlanMoyens
      tags: [plans]
      summary: Get moyens for a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of moyens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moyen"
    post:
      operationId: addMoyen
      tags: [plans]
      summary: Add a moyen to a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMoyenRequest"
      responses:
        "201":
          description: Moyen added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moyen"

  /plans/{id}/moyens/{moyenId}:
    delete:
      operationId: deleteMoyen
      tags: [plans]
      summary: Delete a moyen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /plans/{id}/moyens/{moyenId}/demander:
    post:
      operationId: demanderMoyen
      tags: [plans]
      summary: Initiate an execution request for a moyen (direction only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemanderMoyenRequest"
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moyen"

  /plans/{id}/moyens/{moyenId}/consommer:
    post:
      operationId: consommerMoyen
      tags: [plans]
      summary: Record consumption for a moyen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsommerMoyenRequest"
      responses:
        "200":
          description: Consumption recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moyen"

  /plans/{id}/attachments:
    get:
      operationId: getPlanAttachments
      tags: [attachments]
      summary: Get attachments for a plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
    post:
      operationId: addAttachment
      tags: [attachments]
      summary: Add an attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentRequest"
      responses:
        "201":
          description: Attachment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /plans/{id}/attachments/{attachmentId}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /directions:
    get:
      operationId: getDirections
      tags: [users]
      summary: Get all directions
      responses:
        "200":
          description: List of directions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Direction"
    post:
      operationId: createDirection
      tags: [users]
      summary: Create a new direction (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectionBody"
      responses:
        "201":
          description: Direction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Direction"
        "400":
          description: Bad request

  /directions/{id}:
    put:
      operationId: updateDirection
      tags: [users]
      summary: Update a direction (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectionBody"
      responses:
        "200":
          description: Direction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Direction"
        "404":
          description: Not found
    delete:
      operationId: deleteDirection
      tags: [users]
      summary: Delete a direction (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /employes:
    get:
      operationId: getEmployes
      tags: [employes]
      summary: Search employees
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by matricule, NNI or name
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employe"
    post:
      operationId: createEmploye
      tags: [employes]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employe"

  /employes/{id}:
    get:
      operationId: getEmploye
      tags: [employes]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employe"
    put:
      operationId: updateEmploye
      tags: [employes]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employe"
    delete:
      operationId: deleteEmploye
      tags: [employes]
      summary: Delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /plans/{id}/moyens/{moyenId}/beneficiaires:
    get:
      operationId: getBeneficiaires
      tags: [plans]
      summary: Get beneficiaries for an indemnite moyen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of beneficiaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndemniteBeneficiaire"
    post:
      operationId: setBeneficiaires
      tags: [plans]
      summary: Set (replace) beneficiaries for an indemnite moyen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetBeneficiairesRequest"
      responses:
        "200":
          description: Beneficiaries set
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndemniteBeneficiaire"

  /plans/{id}/moyens/{moyenId}/materiel-items:
    get:
      operationId: getMaterielItems
      tags: [plans]
      summary: Get stock items for a materiel moyen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of materiel items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaterielItem"

  /plans/{id}/moyens/{moyenId}/materiel-demandes:
    get:
      operationId: getMaterielDemandes
      tags: [plans]
      summary: Get materiel demandes for a moyen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of demandes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaterielDemande"
    post:
      operationId: createMaterielDemande
      tags: [plans]
      summary: Direction creates a partial materiel request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterielDemandeRequest"
      responses:
        "201":
          description: Demande created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterielDemande"

  /plans/{id}/moyens/{moyenId}/materiel-demandes/{demandeId}/da-soumettre:
    post:
      operationId: daSoumettreMaterielDemande
      tags: [plans]
      summary: DA prices items and submits bon to DCGAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
        - name: demandeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DaSoumettreMaterielRequest"
      responses:
        "200":
          description: Bon submitted to DCGAI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterielDemande"

  /plans/{id}/moyens/{moyenId}/materiel-demandes/{demandeId}/dcgai-valider:
    post:
      operationId: dcgaiValiderMaterielDemande
      tags: [plans]
      summary: DCGAI validates the bon de consommation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: moyenId
          in: path
          required: true
          schema:
            type: integer
        - name: demandeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dcgaiUserId:
                  type: integer
              required: [dcgaiUserId]
      responses:
        "200":
          description: Bon validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterielDemande"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Direction:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        code:
          type: string
      required: [id, nom, code]

    CreateDirectionBody:
      type: object
      properties:
        nom:
          type: string
        code:
          type: string
      required: [nom, code]

    User:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [direction, controle_technique, dga, directeur_general, dmg, da, controle_financier, dcgai, direction_financiere, rh, admin, en_attente]
        directionId:
          type: integer
        directionNom:
          type: string
        niveau:
          type: string
          enum: [standard, directeur_centrale]
      required: [id, nom, prenom, email, role]

    Plan:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        titre:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date
        duree:
          type: integer
        directionId:
          type: integer
        directionNom:
          type: string
        statut:
          type: string
          enum: [brouillon, en_attente_dc, en_attente_ct, en_attente_dga, en_attente_dg, approuve, rejete, ouvert, cloture]
        createdById:
          type: integer
        createdByNom:
          type: string
        budgetTotal:
          type: number
        montantConsomme:
          type: number
        commentaireRejet:
          type: string
        rapportCloture:
          type: string
        dateCloture:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        moyens:
          type: array
          items:
            $ref: "#/components/schemas/Moyen"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
      required: [id, titre, description, dateDebut, duree, directionId, statut, createdById, budgetTotal, montantConsomme, createdAt, updatedAt]

    Moyen:
      type: object
      properties:
        id:
          type: integer
        planId:
          type: integer
        categorie:
          type: string
          enum: [materiel, outillage, accessoire, carburant, location, logement, logistique, prime, indemnite_journaliere, autres]
        description:
          type: string
        budget:
          type: number
        unite:
          type: string
        quantite:
          type: number
        montantConsomme:
          type: number
        demandeStatus:
          type: string
          enum: [demandee, consommee]
        demandeById:
          type: integer
        demandeAt:
          type: string
          format: date-time
        autresDirectionId:
          type: integer
        listeMaterielJson:
          type: string
        locationVehiculeSimple:
          type: integer
        locationEngin:
          type: integer
      required: [id, planId, categorie, description, budget, montantConsomme]

    Attachment:
      type: object
      properties:
        id:
          type: integer
        planId:
          type: integer
        moyenId:
          type: integer
        nom:
          type: string
        type:
          type: string
        taille:
          type: integer
        url:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, planId, nom, type, createdAt]

    CreatePlanRequest:
      type: object
      properties:
        titre:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date
        duree:
          type: integer
        directionId:
          type: integer
        createdById:
          type: integer
      required: [titre, description, dateDebut, duree, directionId, createdById]

    UpdatePlanRequest:
      type: object
      properties:
        titre:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date
        duree:
          type: integer
        directionId:
          type: integer

    ValidatePlanRequest:
      type: object
      properties:
        action:
          type: string
          enum: [approuver, rejeter]
        validatedById:
          type: integer
        commentaire:
          type: string
      required: [action, validatedById]

    CloturerPlanRequest:
      type: object
      properties:
        rapportCloture:
          type: string
        cloturedById:
          type: integer
      required: [rapportCloture, cloturedById]

    CreateMoyenRequest:
      type: object
      properties:
        categorie:
          type: string
          enum: [materiel, outillage, accessoire, carburant, location, logement, logistique, prime, indemnite_journaliere, autres]
        description:
          type: string
        budget:
          type: number
        unite:
          type: string
        quantite:
          type: number
        autresDirectionId:
          type: integer
        listeMaterielJson:
          type: string
        locationVehiculeSimple:
          type: integer
        locationEngin:
          type: integer
      required: [categorie, description, budget]

    ConsommerMoyenRequest:
      type: object
      properties:
        montant:
          type: number
        note:
          type: string
      required: [montant]

    CreateAttachmentRequest:
      type: object
      properties:
        moyenId:
          type: integer
        nom:
          type: string
        type:
          type: string
        taille:
          type: integer
        data:
          type: string
      required: [nom, type]

    AnalyticsDirectionRow:
      type: object
      properties:
        directionId:
          type: integer
        directionNom:
          type: string
        directionCode:
          type: string
        nombrePlans:
          type: integer
        budgetTotal:
          type: number
        montantConsomme:
          type: number
      required: [directionId, directionNom, directionCode, nombrePlans, budgetTotal, montantConsomme]

    AnalyticsCategorieRow:
      type: object
      properties:
        categorie:
          type: string
        budgetTotal:
          type: number
        montantConsomme:
          type: number
        nombreMoyens:
          type: integer
      required: [categorie, budgetTotal, montantConsomme, nombreMoyens]

    AnalyticsData:
      type: object
      properties:
        byDirection:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsDirectionRow"
        byCategorie:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsCategorieRow"
      required: [byDirection, byCategorie]

    DemanderMoyenRequest:
      type: object
      properties:
        demandeById:
          type: integer
